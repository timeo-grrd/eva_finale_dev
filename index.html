<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliothèque</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Titre -->
    <h1>Bienvenue sur notre site de suggestion de sortie étudiante !</h1>
    <h2>
      sur notre site nous vous proposons des suggestions pour vos sorties en
      fonction de vos envie et de votre budget
    </h2>

    <!-- Formulaire d'ajout -->
    <!-- "id": 1, "titre": "Soirée cinéma entre amis", "categorie": "cinéma", "budget": 10, "description": "Regarder un film récent ou culte avec des amis dans une ambiance conviviale.", "note": 4 -->
    <form>
      <div>
        <label for="titre">Titre :</label>
        <input
          type="text"
          id="titre"
          name="titre"
          placeholder="Soirée cinéma entre amis"
        />
      </div>
      <br />
      <div>
        <label for="budget">budget : </label>
        <input type="text" id="budget" name="budget" placeholder="10" />
      </div>
      <br />
      <div>
        <label for="categorie">Catégorie :</label>
        <select id="categorie" name="categorie">
          <option value="Cinéma">Cinéma</option>
          <option value="Nature">Nature</option>
          <option value="Sport">Sport</option>
          <option value="Food">Food</option>
          <option value="Culture">Culture</option>
          <option value="Jeu">Jeu</option>
        </select>
      </div>
      <div>
        <label for="description">description : </label>
        <input
          type="text"
          id="description"
          name="description"
          placeholder="Description de l'activité"
        />
      </div>
      <br />
      <button type="submit">Ajouter</button>
    </form>

    <br />
    <hr />

    <!-- Zone de liste -->
    <h2>Zone de liste</h2>

    <div class="search-bar">
      <label for="search">Rechercher :</label>
      <input
        type="text"
        id="search"
        placeholder="Titre, Auteur ou Catégorie..."
      />
    </div>

    <button id="btn-refresh">Charger la liste</button>
    <ul id="liste"></ul>

    <script src="script.js"></script>
  </body>
</html>
